<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wild Road Spirits — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --bg:          #1C1917;
  --bg-card:     #252220;
  --bg-raised:   #2E2A27;
  --bg-input:    #332F2B;
  --border:      #3D3832;
  --border-light:#4A4540;
  --text:        #F5F0E8;
  --text-muted:  #9A9390;
  --text-dim:    #6B6662;
  --amber:       #C4692A;
  --amber-light: #D4804A;
  --amber-dim:   #7A3E18;
  --sage:        #7A9E7E;
  --sage-dim:    #3D5E40;
  --red:         #C44A4A;
  --red-dim:     #6B2828;
  --yellow:      #C4A84A;
  --yellow-dim:  #6B5A28;
  --blue:        #4A7AC4;
  --blue-dim:    #28406B;
  --sidebar-w:   220px;
  --radius:      8px;
  --radius-lg:   12px;
}

/* ─── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overflow: hidden; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: 14px; }
svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
ul { list-style: none; }

/* ─── LAYOUT ─────────────────────────────────────────────── */
#app { display: flex; height: 100vh; }

#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  padding: 0;
}

#main {
  flex: 1;
  overflow-y: auto;
  position: relative;
}

.view { display: none; min-height: 100%; }
.view.active { display: block; }

/* ─── SIDEBAR ────────────────────────────────────────────── */
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 16px 18px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  width: 36px; height: 36px;
  background: var(--amber);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 700; font-size: 14px;
  color: #fff; flex-shrink: 0;
}
.logo-text { display: flex; flex-direction: column; }
.logo-title { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
.logo-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }

.nav-links { padding: 10px 8px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 13px; font-weight: 500;
  transition: background 0.15s, color 0.15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-raised); color: var(--text); }
.nav-item.active { background: var(--amber-dim); color: var(--amber-light); }
.nav-item svg { width: 15px; height: 15px; }

.sidebar-footer {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
}
.btn-ghost {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 10px;
  border-radius: var(--radius);
  color: var(--text-muted); font-size: 12px;
  transition: background 0.15s, color 0.15s;
}
.btn-ghost:hover { background: var(--bg-raised); color: var(--text); }
.btn-ghost svg { width: 14px; height: 14px; }

/* ─── PAGE HEADER ────────────────────────────────────────── */
.page-header {
  padding: 28px 32px 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px;
}
.page-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 600; }
.page-sub { color: var(--text-muted); font-size: 13px; margin-top: 3px; }
.page-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 4px; }

/* ─── BUTTONS ────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--amber); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: var(--bg-raised); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--border-light); }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-dim); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn svg { width: 14px; height: 14px; }

/* ─── CARDS ──────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.card-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-dim); margin-bottom: 14px;
}

/* ─── PILLS / STATUS ─────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase;
}
.pill-stocked    { background: var(--sage-dim);   color: var(--sage); }
.pill-warm       { background: var(--yellow-dim);  color: var(--yellow); }
.pill-prospect   { background: var(--blue-dim);    color: var(--blue); }
.pill-reengage   { background: var(--amber-dim);   color: var(--amber-light); }
.pill-cold       { background: var(--bg-raised);   color: var(--text-muted); }
.pill-nostock    { background: var(--red-dim);     color: var(--red); }

/* ─── FORMS ──────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.03em; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--amber);
}
.form-select { appearance: none; cursor: pointer; }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ─── DASHBOARD ──────────────────────────────────────────── */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 24px 32px 0;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
}
.stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin: 6px 0 4px; }
.stat-sub { font-size: 11px; color: var(--text-muted); }
.stat-accent { color: var(--amber); }
.stat-sage { color: var(--sage); }
.stat-red { color: var(--red); }
.stat-blue { color: var(--blue); }

.dashboard-lower {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 14px 32px 32px;
}

.overdue-list, .recent-list { display: flex; flex-direction: column; gap: 8px; }
.overdue-item, .recent-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  background: var(--bg-raised);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s;
  border: 1px solid transparent;
}
.overdue-item:hover, .recent-item:hover { border-color: var(--border-light); }
.overdue-name { font-size: 13px; font-weight: 500; }
.overdue-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.overdue-days { font-size: 11px; font-weight: 600; color: var(--red); }

/* ─── VENUES LIST ────────────────────────────────────────── */
.venues-controls {
  padding: 20px 32px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-box {
  position: relative; flex: 1; min-width: 200px;
}
.search-box svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); width: 14px; height: 14px;
}
.search-box input {
  width: 100%; padding: 8px 12px 8px 34px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
}
.search-box input:focus { outline: none; border-color: var(--amber); }
.filter-select {
  padding: 8px 12px; background: var(--bg-input);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--amber); }

.venues-area-section { padding: 0 32px 32px; }
.area-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0 10px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.area-count {
  background: var(--bg-raised); color: var(--text-muted);
  padding: 1px 7px; border-radius: 10px; font-size: 10px;
}

.venue-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 120px;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  margin-bottom: 4px;
}
.venue-row:hover { background: var(--bg-raised); border-color: var(--border); }
.venue-name { font-size: 13px; font-weight: 500; }
.venue-contact { font-size: 12px; color: var(--text-muted); }
.venue-type { font-size: 11px; color: var(--text-dim); }
.venue-last-seen { font-size: 11px; color: var(--text-muted); }
.venue-row-actions { display: flex; justify-content: flex-end; gap: 6px; }

/* ─── VENUE DETAIL ───────────────────────────────────────── */
.venue-detail-header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
}
.venue-detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-muted);
  padding: 16px 0 14px;
  cursor: pointer; transition: color 0.15s;
}
.venue-detail-back:hover { color: var(--text); }
.venue-detail-back svg { width: 13px; height: 13px; }
.venue-detail-title {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 700;
  padding-bottom: 4px;
}
.venue-detail-meta {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 20px;
  flex-wrap: wrap;
}
.venue-detail-meta span { font-size: 13px; color: var(--text-muted); }
.venue-detail-meta .sep { color: var(--border-light); }

.venue-detail-body {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px;
  padding: 24px 32px 40px;
  align-items: start;
}
.venue-detail-main { display: flex; flex-direction: column; gap: 20px; }
.venue-detail-side { display: flex; flex-direction: column; gap: 16px; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--amber-light); border-bottom-color: var(--amber); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Visit log */
.visit-entry {
  padding: 14px 16px;
  background: var(--bg-raised);
  border-radius: var(--radius);
  border-left: 3px solid var(--border-light);
  margin-bottom: 10px;
}
.visit-entry.tasting { border-left-color: var(--amber); }
.visit-entry.order { border-left-color: var(--sage); }
.visit-date { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.visit-note { font-size: 13px; line-height: 1.6; }
.visit-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.visit-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }

/* Products stocked */
.products-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.product-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  background: var(--bg-raised); border: 1px solid var(--border);
  font-size: 12px; font-weight: 500;
}
.product-chip.active { border-color: var(--sage-dim); background: var(--sage-dim); color: var(--sage); }
.product-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* Order rows */
.order-row {
  display: grid; grid-template-columns: 1fr 80px 80px 80px;
  gap: 8px; align-items: center;
  padding: 10px 12px;
  background: var(--bg-raised); border-radius: var(--radius);
  margin-bottom: 6px; font-size: 13px;
}
.order-row-header { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

/* Next action */
.next-action-box {
  background: var(--amber-dim);
  border: 1px solid var(--amber);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.next-action-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--amber-light); margin-bottom: 6px; }
.next-action-text { font-size: 13px; color: var(--text); }
.next-action-due { font-size: 11px; color: var(--amber-light); margin-top: 4px; }

/* Contact card */
.contact-entry {
  padding: 12px 14px;
  background: var(--bg-raised); border-radius: var(--radius);
  margin-bottom: 8px;
}
.contact-name { font-size: 13px; font-weight: 600; }
.contact-role { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.contact-detail { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.contact-detail svg { width: 12px; height: 12px; color: var(--text-dim); }
.contact-detail a:hover { color: var(--amber-light); }

/* ─── PLANNER ─────────────────────────────────────────────── */
.planner-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  padding: 24px 32px 32px;
}
.planner-day { display: flex; flex-direction: column; gap: 8px; }
.planner-day-header {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 600;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.planner-day-label { color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; }
.planner-slot {
  padding: 11px 13px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s;
}
.planner-slot:hover { border-color: var(--border-light); }
.planner-slot-name { font-size: 13px; font-weight: 500; }
.planner-slot-area { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.planner-add {
  padding: 10px; text-align: center;
  border: 1px dashed var(--border); border-radius: var(--radius);
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.planner-add:hover { border-color: var(--amber); color: var(--amber-light); }

/* ─── STOCK ──────────────────────────────────────────────── */
.stock-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  padding: 24px 32px 0;
}
.stock-card { }
.stock-product-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.stock-bar-wrap { background: var(--bg-raised); border-radius: 4px; height: 6px; margin: 8px 0 4px; overflow: hidden; }
.stock-bar { height: 100%; border-radius: 4px; background: var(--sage); transition: width 0.4s; }
.stock-bar.warn { background: var(--yellow); }
.stock-bar.low { background: var(--red); }
.stock-numbers { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }
.stock-big { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin: 4px 0; }

.stock-log { padding: 14px 32px 32px; }
.delivery-row {
  display: grid; grid-template-columns: 1.5fr 1fr 1fr 80px 80px;
  gap: 10px; align-items: center;
  padding: 10px 14px;
  background: var(--bg-raised); border-radius: var(--radius);
  margin-bottom: 6px; font-size: 13px;
}
.delivery-header-row { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; background: transparent; padding: 0 14px 6px; }

/* ─── METRICS ─────────────────────────────────────────────── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 24px 32px 0;
}
.metrics-lower {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
  padding: 14px 32px 32px;
}

.chart-wrap {
  position: relative;
  height: 200px;
  margin-top: 8px;
}
canvas { display: block; }

.leaderboard-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.leaderboard-row:last-child { border-bottom: none; }
.leaderboard-rank { font-size: 11px; color: var(--text-dim); width: 20px; }
.leaderboard-name { flex: 1; }
.leaderboard-val { font-weight: 600; color: var(--sage); }

.cashflow-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.cashflow-row:last-child { border-bottom: none; }
.cashflow-label { font-size: 13px; }
.cashflow-val { font-size: 14px; font-weight: 600; }
.cashflow-val.positive { color: var(--sage); }
.cashflow-val.negative { color: var(--red); }

/* ─── MODAL ──────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* ─── MISC ───────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--text-dim); font-size: 13px;
}
.empty-state svg { width: 32px; height: 32px; margin: 0 auto 12px; display: block; opacity: 0.4; }

.divider { height: 1px; background: var(--border); margin: 16px 0; }

.tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
}
.tag-bar       { background: var(--blue-dim);   color: var(--blue); }
.tag-restaurant{ background: var(--amber-dim);  color: var(--amber-light); }
.tag-bottleshop{ background: var(--sage-dim);   color: var(--sage); }
.tag-hotel     { background: var(--bg-raised);  color: var(--text-muted); border: 1px solid var(--border); }

.scroll-area { overflow-y: auto; }

/* ─── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ─── GOAL PROGRESS ──────────────────────────────────────── */
.goal-bar-wrap {
  background: var(--bg-raised); border-radius: 6px;
  height: 8px; margin-top: 10px; overflow: hidden;
}
.goal-bar { height: 100%; background: var(--amber); border-radius: 6px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.goal-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

/* ─── BOTTOM NAV (mobile only) ───────────────────────────── */
#bottomnav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  z-index: 50;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bottomnav-row { display: flex; justify-content: space-around; align-items: center; height: 58px; }
.bottomnav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--text-dim); font-size: 10px; font-weight: 500;
  flex: 1; padding: 6px 0;
  transition: color 0.15s;
}
.bottomnav-item.active { color: var(--amber-light); }
.bottomnav-item svg { width: 20px; height: 20px; }

/* Floating action button */
.fab {
  display: none;
  position: fixed; right: 16px; bottom: 74px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--amber); color: #fff;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  z-index: 51; border: none;
}
.fab svg { width: 24px; height: 24px; }

/* ─── TODAY VIEW (mobile home) ──────────────────────────── */
.today-header {
  padding: 20px 16px 4px;
}
.today-date { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; }
.today-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.today-progress {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  margin: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.today-progress-ring {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--amber-dim);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-weight: 700; font-size: 15px;
  color: var(--amber-light); flex-shrink: 0;
}

.today-card {
  margin: 0 16px 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.today-card.done { opacity: 0.5; }
.today-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.today-card-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; }
.today-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.today-card-actions { display: flex; gap: 8px; margin-top: 14px; }
.today-btn {
  flex: 1; padding: 12px; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; text-align: center;
  border: 1px solid var(--border);
}
.today-btn-primary { background: var(--amber); color: #fff; border: none; }
.today-btn-secondary { background: var(--bg-raised); color: var(--text); }

/* ─── MOBILE BOTTOM SHEET MODAL ──────────────────────────── */
@media (max-width: 640px) {
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal-box {
    max-width: 100%; width: 100%;
    border-radius: 16px 16px 0 0;
    max-height: 92vh;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0));
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
}

/* ─── RESPONSIVE ─────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 56px; }
  .logo-text, .nav-item span, .btn-ghost span, .sidebar-footer .btn-ghost { display: none; }
  .nav-item { justify-content: center; padding: 10px; }
  .logo-mark { margin: 0 auto; }
  .sidebar-logo { justify-content: center; padding: 16px 8px; }
  .dashboard-grid { grid-template-columns: 1fr 1fr; }
  .planner-grid { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .venue-detail-body { grid-template-columns: 1fr; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  /* Hide desktop sidebar, show bottom nav */
  #sidebar { display: none; }
  #bottomnav { display: block; }
  .fab { display: flex; }
  #main { padding-bottom: 70px; }

  /* Page header */
  .page-header { padding: 16px 16px 0; flex-direction: column; align-items: flex-start; gap: 10px; }
  .page-title { font-size: 21px; }
  .page-actions { width: 100%; }
  .page-actions .btn { flex: 1; justify-content: center; }

  /* Dashboard */
  .dashboard-grid { grid-template-columns: 1fr 1fr; padding: 16px 16px 0; gap: 10px; }
  .stat-card { padding: 14px; }
  .stat-value { font-size: 24px; }
  .dashboard-lower { grid-template-columns: 1fr; padding: 10px 16px 16px; gap: 10px; }

  /* Venues list */
  .venues-controls { padding: 14px 16px; flex-direction: column; align-items: stretch; }
  .filter-select { width: 100%; }
  .venues-area-section { padding: 0 16px 90px; }

  .venue-row {
    grid-template-columns: 1fr;
    gap: 6px;
    padding: 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .venue-row > div:nth-child(2),
  .venue-row > div:nth-child(3) { display: inline-block; margin-right: 8px; }
  .venue-name { font-size: 15px; }
  .venue-row-actions { justify-content: stretch; margin-top: 6px; }
  .venue-row-actions .btn { flex: 1; padding: 9px; font-size: 12px; }

  /* Venue detail */
  .venue-detail-header { padding: 0 16px; }
  .venue-detail-title { font-size: 24px; }
  .venue-detail-meta { gap: 8px; padding-bottom: 16px; }
  .venue-detail-meta div { width: 100%; margin-left: 0 !important; display: flex; gap: 8px; margin-top: 8px; }
  .venue-detail-meta div .btn { flex: 1; justify-content: center; }
  .venue-detail-body { padding: 16px 16px 90px; gap: 14px; }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { white-space: nowrap; padding: 10px 12px; font-size: 12px; }

  /* Orders table -> stack */
  .order-row, .order-row-header { grid-template-columns: 1fr 1fr; gap: 6px 10px; }
  .order-row-header span:nth-child(3), .order-row-header span:nth-child(4) { display: none; }

  /* Planner */
  .planner-grid { padding: 14px 16px 90px; gap: 14px; }

  /* Stock */
  .stock-grid { grid-template-columns: 1fr 1fr; padding: 16px 16px 0; gap: 10px; }
  .stock-log { padding: 14px 16px 90px; }
  .delivery-row, .delivery-header-row { grid-template-columns: 1.5fr 1fr 1fr; gap: 6px; font-size: 12px; }

  .metrics-grid { grid-template-columns: 1fr 1fr; padding: 16px 16px 0; gap: 10px; }
  .metrics-lower { grid-template-columns: 1fr; padding: 10px 16px 90px; gap: 10px; }
  .chart-wrap { height: 160px; }

  /* Settings */
  #view-settings > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; padding: 16px !important; padding-bottom: 90px !important; }

  .modal-title { font-size: 18px; }
}

const Store = {
  get(key, def) {
    try { const v = localStorage.getItem('wr_' + key); return v ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set(key, val) {
    try { localStorage.setItem('wr_' + key, JSON.stringify(val)); } catch {}
  },
  init() {
    const SEED_VERSION = 3; // bump this to force re-seed on existing installs
    if (Store.get('seedVersion') !== SEED_VERSION) {
      Store.set('venues',      DEFAULT_VENUES);

<script>
// ─── WILD ROAD SPIRITS CRM — APP.JS ──────────────────────────

// ─── Render namespace (must be declared first) ───────────────
const Render = {};

Store.init();

// ─── ROUTER ──────────────────────────────────────────────────
const Router = {
  current: 'dashboard',
  venueId: null,
  go(view, venueId = null) {
    this.current = view;
    this.venueId = venueId;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.bottomnav-item').forEach(n => n.classList.remove('active'));
    const el = document.getElementById('view-' + view);
    if (el) el.classList.add('active');
    const navKey = view === 'venue-detail' ? 'venues' : view;
    const nav = document.querySelector(`.nav-item[data-view="${navKey}"]`);
    if (nav) nav.classList.add('active');
    const bnav = document.querySelector(`.bottomnav-item[data-view="${navKey}"]`);
    if (bnav) bnav.classList.add('active');
    Render[view] && Render[view](venueId);
    document.getElementById('main').scrollTo(0, 0);
  }
};

// ─── HELPERS ─────────────────────────────────────────────────
const $ = (s, ctx = document) => ctx.querySelector(s);
const $$ = (s, ctx = document) => [...ctx.querySelectorAll(s)];

function fmt(date) {
  if (!date) return '—';
  const d = new Date(date);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtShort(date) {
  if (!date) return '';
  const d = new Date(date);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}
function daysSince(date) {
  if (!date) return 999;
  return Math.floor((Date.now() - new Date(date)) / 86400000);
}
function currency(n) { return '$' + Number(n).toLocaleString('en-AU', { minimumFractionDigits: 0 }); }

function pillHtml(status) {
  const s = STATUS_OPTIONS.find(o => o.value === status) || STATUS_OPTIONS[0];
  return `<span class="pill ${s.pill}">${s.label}</span>`;
}
function typeTagHtml(type) {
  const map = { 'Bar': 'tag-bar', 'Restaurant': 'tag-restaurant', 'Bottleshop': 'tag-bottleshop', 'Hotel': 'tag-hotel', 'Wine Store': 'tag-bottleshop' };
  return `<span class="tag ${map[type] || 'tag-hotel'}">${type}</span>`;
}
function productName(id) { return Store.products().find(p => p.id === id)?.name || id; }
function venueName(id) { return Store.venues().find(v => v.id === id)?.name || '—'; }

function lastVisitDate(venueId) {
  const visits = Store.visits().filter(v => v.venueId === venueId).sort((a,b) => b.date.localeCompare(a.date));
  return visits[0]?.date || null;
}

function overdueVenues(days = 21) {
  return Store.venues()
    .filter(v => ['stocked','warm','reengage'].includes(v.status))
    .map(v => ({ ...v, lastVisit: lastVisitDate(v.id) }))
    .filter(v => daysSince(v.lastVisit) > days)
    .sort((a,b) => daysSince(b.lastVisit) - daysSince(a.lastVisit));
}

// ─── MODAL ───────────────────────────────────────────────────
const Modal = {
  show(html, onReady) {
    $('#modal-box').innerHTML = html;
    $('#modal-overlay').classList.remove('hidden');
    onReady && onReady($('#modal-box'));
    $('#modal-overlay').onclick = e => { if (e.target === $('#modal-overlay')) Modal.hide(); };
  },
  hide() { $('#modal-overlay').classList.add('hidden'); },
};

// ─── RENDER: TODAY (mobile home) ──────────────────────────────
Render.today = function() {
  const venues = Store.venues();
  const planner = Store.planner();
  const venueMap = {};
  venues.forEach(v => venueMap[v.id] = v);

  const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const todayKey = dayNames[new Date().getDay()];
  const plannerDays = ['tuesday','wednesday','thursday'];

  let venueIds = [];
  let heading = "Today's Run";
  let subheading = new Date().toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long' });

  if (plannerDays.includes(todayKey)) {
    venueIds = planner[todayKey] || [];
  } else {
    // Monday/Friday/weekend - show overdue + upcoming next actions
    heading = "Admin & Follow-ups";
    const overdue = overdueVenues(14).map(v => v.id);
    venueIds = overdue.slice(0, 8);
  }

  const todayVisits = Store.visits().filter(v => v.date === new Date().toISOString().slice(0,10)).map(v => v.venueId);
  const doneCount = venueIds.filter(id => todayVisits.includes(id)).length;

  document.getElementById('view-today').innerHTML = `
    <div class="today-header">
      <div class="today-date">${heading}</div>
      <div class="today-sub">${subheading}</div>
    </div>

    ${venueIds.length ? `
      <div class="today-progress">
        <div class="today-progress-ring">${doneCount}/${venueIds.length}</div>
        <div>
          <div style="font-size:13px;font-weight:600">${doneCount === venueIds.length ? 'All done for today! 🎉' : `${venueIds.length - doneCount} venues to go`}</div>
          <div style="font-size:11px;color:var(--text-muted)">Tap a venue to log a visit</div>
        </div>
      </div>
    ` : ''}

    ${venueIds.length ? venueIds.map(vid => {
      const v = venueMap[vid];
      if (!v) return '';
      const isDone = todayVisits.includes(vid);
      const lastV = lastVisitDate(vid);
      return `
        <div class="today-card ${isDone ? 'done' : ''}">
          <div class="today-card-top" onclick="Router.go('venue-detail','${vid}')">
            <div>
              <div class="today-card-name">${v.name} ${isDone ? '✓' : ''}</div>
              <div class="today-card-meta">${v.suburb || v.area} · ${v.type}</div>
              <div class="today-card-meta">${pillHtml(v.status)} ${v.nextAction ? '· ' + v.nextAction : ''}</div>
            </div>
          </div>
          <div class="today-card-actions">
            <div class="today-btn today-btn-secondary" onclick="Router.go('venue-detail','${vid}')">View Profile</div>
            <div class="today-btn today-btn-primary" onclick="showAddVisitModal('${vid}')">${isDone ? 'Add Note' : 'Log Visit'}</div>
          </div>
        </div>`;
    }).join('') : `
      <div class="empty-state" style="padding-top:60px">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Nothing planned for today.<br>Add venues in the Week Planner.
      </div>
    `}

    <div style="padding:0 16px 16px">

  const now = new Date();

  const lastMonthEnd   = monthStart;

  const revDiff = lastMonthRev ? Math.round((monthRevenue - lastMonthRev) / lastMonthRev * 100) : 0;

        <div class="goal-label"><span>${goalPct}% there</span><span>80 target</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Month Revenue</div>
        <div class="stat-value stat-amber">${currency(monthRevenue)}</div>
        <div class="stat-sub">${revDiff >= 0 ? '↑' : '↓'} ${Math.abs(revDiff)}% vs last month</div>

      <div class="stat-card">

        ${overdue.length ? overdue.map(v => `
          <div class="overdue-item" onclick="Router.go('venue-detail','${v.id}')">

window.filterVenues = function() {
  const q = ($('#venueSearch')?.value || '').toLowerCase();
  const fStatus = $('#filterStatus')?.value || '';
  const fArea   = $('#filterArea')?.value || '';
  const fType   = $('#filterType')?.value || '';

  let venues = Store.venues().filter(v => {
    const matchQ = !q || v.name.toLowerCase().includes(q) || v.suburb?.toLowerCase().includes(q) ||
      v.contacts?.some(c => c.name.toLowerCase().includes(q));
    const matchS = !fStatus || v.status === fStatus;
    const matchA = !fArea   || v.area === fArea;
    const matchT = !fType   || v.type === fType;
    return matchQ && matchS && matchA && matchT;
  });

  const byArea = {};
  venues.forEach(v => { (byArea[v.area] = byArea[v.area] || []).push(v); });

  const container = document.getElementById('venueListContainer');
  if (!container) return;

  if (!venues.length) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>No venues match your filters.</div>';
    return;
  }

  container.innerHTML = AREAS.filter(a => byArea[a]?.length).map(area => `
    <div class="area-header">
      ${area}
      <span class="area-count">${byArea[area].length}</span>
    </div>
    ${byArea[area].map(v => {
      const lastV = lastVisitDate(v.id);
      const contact = v.contacts?.[0];
      return `
        <div class="venue-row" onclick="Router.go('venue-detail','${v.id}')">
          <div>
            <div class="venue-name">${v.name}</div>
            <div class="venue-contact">${contact?.name || '—'}${contact?.phone ? ' · ' + contact.phone : ''}</div>
          </div>
          <div>${typeTagHtml(v.type)}</div>
          <div>${pillHtml(v.status)}</div>
          <div class="venue-last-seen">${lastV ? fmt(lastV) : 'Not visited'}</div>
          <div class="venue-row-actions">
            <button class="btn btn-secondary" style="padding:5px 10px;font-size:11px" onclick="event.stopPropagation();quickLogVisit('${v.id}')">Log Visit</button>
          </div>
        </div>`;
    }).join('')}
  `).join('');
};

window.switchTab = function(tabEl, contentId) {
  const parent = tabEl.closest('.venue-detail-main') || tabEl.closest('.card') || document;
  $$('.tab', tabEl.parentElement).forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  $$('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(contentId)?.classList.add('active');
};

  const venues = Store.venues();

  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      label: d.toLocaleString('en-AU', { month: 'short' }),
      start: d.toISOString().slice(0,10),
      end: new Date(d.getFullYear(), d.getMonth()+1, 0).toISOString().slice(0,10),
    });
  }
  const monthlyRevs = months.map(m => orders.filter(o => o.date >= m.start && o.date <= m.end).reduce((s,o) => s + o.total, 0));

  const thisMonth = months[months.length-1];
  const lastMonth = months[months.length-2];
  const thisRev = monthlyRevs[monthlyRevs.length-1];
  const lastRev = monthlyRevs[monthlyRevs.length-2];
  const totalOrders = orders.length;
  const activeAccounts = venues.filter(v => v.status === 'stocked').length;

  // top venues by revenue
  const byVenue = {};
  orders.forEach(o => { byVenue[o.venueId] = (byVenue[o.venueId] || 0) + o.total; });
  const topVenues = Object.entries(byVenue).sort((a,b) => b[1]-a[1]).slice(0,8);

  // by product
  const byProduct = {};
  orders.forEach(o => { byProduct[o.product] = (byProduct[o.product] || 0) + o.total; });

  // cashflow projection (avg monthly * 1.1 optimistic)
  const avgMonthly = monthlyRevs.slice(0,-1).reduce((s,v) => s+v, 0) / Math.max(1, monthlyRevs.length-1);
  const projection30 = Math.round(avgMonthly * 0.9);
  const projection60 = Math.round(avgMonthly * 1.8);

  document.getElementById('view-metrics').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Metrics</div>
        <div class="page-sub">Sales performance and cashflow overview</div>
      </div>
    </div>
    <div class="metrics-grid">
      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-value stat-sage">${currency(thisRev)}</div>
        <div class="stat-sub">${lastRev ? (thisRev >= lastRev ? '↑' : '↓') + ' ' + Math.abs(Math.round((thisRev-lastRev)/lastRev*100)) + '% vs last month' : 'First month on record'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Month</div>
        <div class="stat-value">${currency(lastRev)}</div>
        <div class="stat-sub">total revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Stockists</div>
        <div class="stat-value stat-amber">${activeAccounts}</div>
        <div class="stat-sub">of 80 goal (${Math.round(activeAccounts/80*100)}%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value stat-blue">${totalOrders}</div>
        <div class="stat-sub">all time</div>
      </div>
    </div>
    <div class="metrics-lower">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <div class="card-title">Monthly Revenue — Last 6 Months</div>
          <div class="chart-wrap">
            <canvas id="revenueChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Revenue by Product</div>
          <div class="chart-wrap" style="height:160px">
            <canvas id="productChart"></canvas>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <div class="card-title">Top Accounts by Revenue</div>
          ${topVenues.map(([vid, rev], i) => `
            <div class="leaderboard-row" onclick="Router.go('venue-detail','${vid}')" style="cursor:pointer">
              <span class="leaderboard-rank">${i+1}</span>
              <span class="leaderboard-name">${venueName(vid)}</span>
              <span class="leaderboard-val">${currency(rev)}</span>
            </div>`).join('')}
        </div>
        <div class="card">
          <div class="card-title">Cashflow Projection</div>
          <div class="cashflow-row"><span class="cashflow-label">Next 30 days</span><span class="cashflow-val positive">${currency(projection30)}</span></div>
          <div class="cashflow-row"><span class="cashflow-label">Next 60 days</span><span class="cashflow-val positive">${currency(projection60)}</span></div>
          <div class="cashflow-row"><span class="cashflow-label">Monthly avg (6mo)</span><span class="cashflow-val">${currency(Math.round(avgMonthly))}</span></div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:10px">Based on avg reorder cycle of active accounts.</div>
        </div>
      </div>
    </div>
  `;

  // Draw charts
  drawBarChart('revenueChart', months.map(m => m.label), monthlyRevs);
  drawDonutChart('productChart', Store.products().map(p => p.name), Store.products().map(p => byProduct[p.id] || 0));

function drawBarChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight;
  canvas.width = W; canvas.height = H;
  const max = Math.max(...data, 1);
  const pad = { t:10, r:10, b:30, l:50 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;
  ctx.clearRect(0, 0, W, H);
  const barW = cw / labels.length * 0.6;
  const gap = cw / labels.length;
  labels.forEach((label, i) => {
    const x = pad.l + i * gap + gap/2 - barW/2;
    const barH = (data[i] / max) * ch;
    const y = pad.t + ch - barH;
    ctx.fillStyle = i === labels.length-1 ? '#C4692A' : '#3D3832';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 4);
    ctx.fill();
    ctx.fillStyle = '#6B6662';
    ctx.font = '11px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + barW/2, H - 8);
    if (data[i] > 0) {
      ctx.fillStyle = '#9A9390';
      ctx.fillText('$' + (data[i]/1000).toFixed(1) + 'k', x + barW/2, y - 4);
    }
  });
}

function drawDonutChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight;
  canvas.width = W; canvas.height = H;
  const colors = ['#C4692A','#7A9E7E','#4A7AC4','#C4A84A','#9B59B6'];
  const total = data.reduce((s,v) => s+v, 0);
  if (!total) return;
  const cx = H/2 + 10, cy = H/2, r = H/2 - 14, innerR = r * 0.55;
  let angle = -Math.PI/2;
  data.forEach((val, i) => {
    if (!val) return;
    const slice = (val / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    angle += slice;
  });
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI*2);
  ctx.fillStyle = '#252220';
  ctx.fill();
  // legend
  const legX = H + 20;
  labels.forEach((label, i) => {
    if (!data[i]) return;
    const y = 20 + i * 22;
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(legX, y - 7, 10, 10);
    ctx.fillStyle = '#9A9390';
    ctx.font = '11px Inter';
    ctx.textAlign = 'left';
    ctx.fillText(label, legX + 14, y + 2);
    ctx.fillStyle = '#F5F0E8';
    ctx.fillText('$' + data[i].toLocaleString(), legX + 14, y + 14);
  });
}

window.saveOrder = function(venueId) {
  const qty = parseInt($('#m-qty').value) || 0;
  const price = parseFloat($('#m-price').value) || 0;
  const orders = Store.orders();
  orders.push({
    id: Store.nextId('o'),
    venueId,
    date: $('#m-date').value,
    product: $('#m-product').value,
    qty,
    unitPrice: price,
    total: qty * price,
    type: 'sale',
  });
  Store.saveOrders(orders);
  // update stock
  const stock = Store.stock();
  const productId = $('#m-product').value;
  const si = stock.findIndex(s => s.productId === productId);
  if (si > -1) stock[si].totalUnits = Math.max(0, stock[si].totalUnits - qty);
  Store.saveStock(stock);
  Modal.hide();
  Router.go('venue-detail', venueId);
};

  const day = $('#m-day').value;
  const venueId = $('#m-venue').value;
  const p = Store.planner();
  p[day] = p[day] || [];
  if (!p[day].includes(venueId)) p[day].push(venueId);
  Store.savePlanner(p);
  Modal.hide();
  Render.planner();
};

window.showPlannerWeekModal = function() {
  const p = Store.planner();
  Modal.show(`
    <div class="modal-title">Change Week</div>
    <div class="form-group"><label class="form-label">Week starting (Monday)</label>
      <input class="form-input" type="date" id="m-week" value="${p.weekOf}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="Modal.hide()">Cancel</button>
      <button class="btn btn-primary" onclick="savePlannerWeek()">Update</button>
    </div>
  `);
};

window.savePlannerWeek = function() {
  const p = Store.planner();
  p.weekOf = $('#m-week').value;
  Store.savePlanner(p);
  Modal.hide();
  Render.planner();
};

window.quickLogVisit = function(venueId) {
  showAddVisitModal(venueId);
};

// Quick visit from dashboard
window.quickVisitModalHtml = function() {
  const venues = Store.venues();
  return `
    <div class="modal-title">Quick Log Visit</div>
    <div class="form-group"><label class="form-label">Venue</label>
      <select class="form-select" id="m-venue">
        ${venues.map(v => `<option value="${v.id}">${v.name}</option>`).join('')}
      </select>
    </div>
    <div id="quick-visit-form"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="Modal.hide()">Cancel</button>
      <button class="btn btn-primary" onclick="saveQuickVisit()">Save</button>
    </div>
  `;
};

window.setupQuickVisit = function() {
  $('#m-venue')?.addEventListener('change', renderQuickForm);
  renderQuickForm();
};

function renderQuickForm() {
  const container = document.getElementById('quick-visit-form');
  if (!container) return;
  container.innerHTML = `
    <div class="form-row" style="margin-top:8px">
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="m-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="m-type">
          <option value="visit">Visit</option>
          <option value="tasting">Tasting</option>
          <option value="order">Order</option>
          <option value="call">Call</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="m-note" placeholder="What happened?"></textarea></div>
    <div class="form-group"><label class="form-label">Outcome</label>
      <select class="form-select" id="m-outcome">
        <option value="positive">Positive</option>
        <option value="follow-up">Follow-up needed</option>
        <option value="neutral">Neutral</option>
        <option value="negative">Not interested</option>
      </select>
    </div>
  `;
}

window.saveQuickVisit = function() {
  const venueId = $('#m-venue')?.value;
  if (!venueId) return;
  saveVisit(venueId);
};

// ─── EXPORT ──────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = {
    venues: Store.venues(),
    visits: Store.visits(),
    orders: Store.orders(),
    stock: Store.stock(),
    planner: Store.planner(),
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wildroad-crm-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
});

// ─── NAV ─────────────────────────────────────────────────────
document.querySelectorAll('.nav-item, .bottomnav-item').forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    Router.go(item.dataset.view);
  });
});

// ─── RENDER: SETTINGS ────────────────────────────────────────
Render.settings = function() {
  const products = Store.products();
  const SPIRIT_TYPES = ['Whisky', 'Gin', 'Rum', 'Vodka', 'Brandy', 'Liqueur', 'Other'];

  document.getElementById('view-settings').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Settings</div>
        <div class="page-sub">Manage your product range and app data</div>
      </div>
    </div>

    <div style="padding:24px 32px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

      <div class="card">
        <div class="card-title">Product Range</div>
        <div style="margin-bottom:16px;font-size:12px;color:var(--text-muted)">
          These products appear across venue profiles, stock tracking, and order forms.
        </div>
        <div id="product-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
          ${products.map(p => `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-raised);border-radius:var(--radius);border:1px solid var(--border)">
              <div style="flex:1">
                <div style="font-size:13px;font-weight:500">${p.name}</div>
                <div style="font-size:11px;color:var(--text-dim);margin-top:1px">${p.type} · RRP $${p.rrp}</div>
              </div>
              <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="showEditProductModal('${p.id}')">Edit</button>
              <button class="btn btn-danger" style="padding:4px 10px;font-size:11px" onclick="deleteProduct('${p.id}')">Remove</button>
            </div>`).join('')}
        </div>
        <button class="btn btn-primary" onclick="showAddProductModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Product
        </button>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">
          <div class="card-title">Data Management</div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <div style="font-size:12px;color:var(--text-muted);line-height:1.6">
              Export a full backup of all venues, visits, orders, and stock data as a JSON file.
            </div>
            <button class="btn btn-secondary" id="exportBtnSettings">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export All Data
            </button>
          </div>
        </div>

        <div class="card" style="border-color:var(--red-dim)">
          <div class="card-title" style="color:var(--red)">Danger Zone</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.6">
            Clear all sales and order history. Venues and contacts are kept. This cannot be undone.
          </div>
          <button class="btn btn-danger" onclick="clearAllOrders()">Clear All Sales Data</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('exportBtnSettings')?.addEventListener('click', () => {
    document.getElementById('exportBtn').click();
  });
};

window.showAddProductModal = function() {
  const SPIRIT_TYPES = ['Whisky', 'Gin', 'Rum', 'Vodka', 'Brandy', 'Liqueur', 'Other'];
  Modal.show(`
    <div class="modal-title">Add Product</div>
    <div class="form-group"><label class="form-label">Product Name*</label>
      <input class="form-input" id="m-pname" placeholder="e.g. Rogue & Vagabond Silver Rum">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Spirit Type</label>
        <select class="form-select" id="m-ptype">
          ${SPIRIT_TYPES.map(t => `<option>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">RRP ($)</label>
        <input class="form-input" type="number" id="m-prrp" value="79" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="Modal.hide()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewProduct()">Add Product</button>
    </div>
  `);
};

window.saveNewProduct = function() {
  const name = $('#m-pname')?.value?.trim();
  if (!name) return alert('Product name is required.');
  const products = Store.products();
  const newProduct = {
    id: Store.nextId('p'),
    name,
    type: $('#m-ptype').value,
    rrp: parseFloat($('#m-prrp').value) || 79,
  };
  products.push(newProduct);
  Store.saveProducts(products);
  // Also add a stock entry for the new product
  const stock = Store.stock();
  stock.push({ productId: newProduct.id, totalUnits: 0, delivered: 0, returned: 0 });
  Store.saveStock(stock);
  Modal.hide();
  Render.settings();
};

window.showEditProductModal = function(productId) {
  const p = Store.products().find(x => x.id === productId);
  if (!p) return;
  const SPIRIT_TYPES = ['Whisky', 'Gin', 'Rum', 'Vodka', 'Brandy', 'Liqueur', 'Other'];
  Modal.show(`
    <div class="modal-title">Edit Product</div>
    <div class="form-group"><label class="form-label">Product Name</label>
      <input class="form-input" id="m-pname" value="${p.name}">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Spirit Type</label>
        <select class="form-select" id="m-ptype">
          ${SPIRIT_TYPES.map(t => `<option ${t===p.type?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">RRP ($)</label>
        <input class="form-input" type="number" id="m-prrp" value="${p.rrp}" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="Modal.hide()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditProduct('${productId}')">Save</button>
    </div>
  `);
};

window.saveEditProduct = function(productId) {
  const products = Store.products();
  const idx = products.findIndex(p => p.id === productId);
  if (idx === -1) return;
  products[idx] = { ...products[idx], name: $('#m-pname').value, type: $('#m-ptype').value, rrp: parseFloat($('#m-prrp').value) || 79 };
  Store.saveProducts(products);
  Modal.hide();
  Render.settings();
};

window.deleteProduct = function(productId) {
  const p = Store.products().find(x => x.id === productId);
  if (!confirm(`Remove "${p?.name}" from your product range? This won't delete historical orders.`)) return;
  Store.saveProducts(Store.products().filter(x => x.id !== productId));
  Render.settings();
};

window.clearAllOrders = function() {
  if (!confirm('Clear all sales data? Venues and contacts will be kept. This cannot be undone.')) return;
  Store.saveOrders([]);
  const stock = Store.stock().map(s => ({ ...s, totalUnits: 0, delivered: 0, returned: 0 }));
  Store.saveStock(stock);
  alert('Sales data cleared.');
  Render.settings();
};

// ─── FAB (mobile quick visit) ─────────────────────────────────
document.getElementById('fab')?.addEventListener('click', () => {
  Modal.show(quickVisitModalHtml());
  setupQuickVisit();
});

// ─── BOOT ─────────────────────────────────────────────────────
Router.go(window.innerWidth <= 640 ? 'today' : 'dashboard');

</script>
</body>
</html>
